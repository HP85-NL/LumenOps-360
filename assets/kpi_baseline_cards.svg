<svg width="680" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', system-ui, sans-serif; background: #F5F3EE;">

  <!-- OEE Card -->
  <rect x="20" y="20" width="150" height="160" rx="10" fill="white" stroke="#E84A27" stroke-width="1.5"/>
  <text x="95" y="50" text-anchor="middle" font-size="12" font-weight="500" fill="#888780">OEE</text>
  <text x="95" y="86" text-anchor="middle" font-size="32" font-weight="600" fill="#E84A27">68.2%</text>
  <text x="95" y="112" text-anchor="middle" font-size="11" fill="#888780">Target: 85%</text>
  <line x1="50" y1="124" x2="140" y2="124" stroke="#F1EFE8" stroke-width="1"/>
  <text x="95" y="146" text-anchor="middle" font-size="11" fill="#5F5E5A">▼ 16.8 pp gap</text>
  <text x="95" y="164" text-anchor="middle" font-size="10" fill="#888780">~€66.5K/mo opportunity</text>

  <!-- OTD Card -->
  <rect x="185" y="20" width="150" height="160" rx="10" fill="white" stroke="#E84A27" stroke-width="1.5"/>
  <text x="260" y="50" text-anchor="middle" font-size="12" font-weight="500" fill="#888780">On-Time Delivery</text>
  <text x="260" y="86" text-anchor="middle" font-size="32" font-weight="600" fill="#E84A27">80.6%</text>
  <text x="260" y="112" text-anchor="middle" font-size="11" fill="#888780">Target: 95%</text>
  <line x1="215" y1="124" x2="305" y2="124" stroke="#F1EFE8" stroke-width="1"/>
  <text x="260" y="146" text-anchor="middle" font-size="11" fill="#5F5E5A">▼ 14.4 pp gap</text>
  <text x="260" y="164" text-anchor="middle" font-size="10" fill="#888780">Root cause: changeover</text>

  <!-- FPY Card -->
  <rect x="350" y="20" width="150" height="160" rx="10" fill="white" stroke="#6B8CAE" stroke-width="1.5"/>
  <text x="425" y="50" text-anchor="middle" font-size="12" font-weight="500" fill="#888780">First Pass Yield</text>
  <text x="425" y="86" text-anchor="middle" font-size="32" font-weight="600" fill="#6B8CAE">96.7%</text>
  <text x="425" y="112" text-anchor="middle" font-size="11" fill="#888780">Target: 99%</text>
  <line x1="380" y1="124" x2="470" y2="124" stroke="#F1EFE8" stroke-width="1"/>
  <text x="425" y="146" text-anchor="middle" font-size="11" fill="#5F5E5A">SPC: not in control</text>
  <text x="425" y="164" text-anchor="middle" font-size="10" fill="#888780">Cpk = 0.669 (2.01σ)</text>

  <!-- Staffing Card -->
  <rect x="515" y="20" width="150" height="160" rx="10" fill="white" stroke="#E84A27" stroke-width="1.5"/>
  <text x="590" y="50" text-anchor="middle" font-size="12" font-weight="500" fill="#888780">Staffing Fill Rate</text>
  <text x="590" y="86" text-anchor="middle" font-size="32" font-weight="600" fill="#E84A27">83.1%</text>
  <text x="590" y="112" text-anchor="middle" font-size="11" fill="#888780">Target: 95%</text>
  <line x1="545" y1="124" x2="635" y2="124" stroke="#F1EFE8" stroke-width="1"/>
  <text x="590" y="146" text-anchor="middle" font-size="11" fill="#5F5E5A">▼ 3.33 pp OEE cost</text>
  <text x="590" y="164" text-anchor="middle" font-size="10" fill="#888780">€16,490/mo impact</text>

</svg>
